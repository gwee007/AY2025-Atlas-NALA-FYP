server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect /nala-assess to /nala-assess/ (with trailing slash)
    location = /nala-assess {
        return 301 $scheme://$host/nala-assess/;
    }

    # Health check endpoint for AWS Load Balancer
    location = /nala-assess/health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Serve static files under /nala-assess/
    location /nala-assess/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /nala-assess/index.html;
    }

    # Proxy API requests to backend
    location /nala-assess/api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
