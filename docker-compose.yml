version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: nala-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dA^WPvd@5rRFcGB@ehI8
      POSTGRES_DB: nala
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./chatbot-backend
      dockerfile: Dockerfile
    container_name: nala-backend
    env_file:
      - ./chatbot-backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./chatbot-frontend
      dockerfile: Dockerfile
    container_name: nala-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
  node_modules: