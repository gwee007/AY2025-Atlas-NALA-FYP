version: '3.8'

services:
  # Model Loader - Downloads models using wget (runs once then exits)
  model-loader:
    image: alpine:latest
    container_name: nala-model-loader
    volumes:
      - ai_models:/models
      - ./scripts/download-models.sh:/download-models.sh:ro
    command: >
      sh -c "
      apk add --no-cache wget &&
      chmod +x /download-models.sh &&
      /download-models.sh &&
      echo 'Model download complete. Container will now exit.' &&
      exit 0
      "
    restart: "no"

  # PostgreSQL with pgvector (PostgreSQL 18)
  db:
    image: pgvector/pgvector:pg18
    container_name: nala-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "psw18"
      POSTGRES_DB: "nala_assess"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/01-create-tables.sql:/docker-entrypoint-initdb.d/01-create-tables.sql:ro
      - ./init-scripts/02-create-indexes-triggers.sql:/docker-entrypoint-initdb.d/02-create-indexes-triggers.sql:ro
      - ./init-scripts/03-insert-data.sql:/docker-entrypoint-initdb.d/03-insert-data.sql:ro
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: nala-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Backend Service
  backend:
    build:
      context: ./chatbot-backend
      dockerfile: Dockerfile
    container_name: nala-backend
    env_file:
      - ./chatbot-backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:psw18@db:5432/nala_assess
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    volumes:
      - ai_models:/models:ro
    depends_on:
      - db
      - redis
      - model-loader
    restart: unless-stopped

  # Dashboard Backend Service
  dashboard-backend:
    build:
      context: ./chatbot-backend
      dockerfile: dashboard_backend/Dockerfile
    container_name: nala-dashboard-backend
    environment:
      - DATABASE_URL=postgresql://postgres:psw18@db:5432/nala_assess
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # Frontend Service - AWS ALB performs health checks on port 80
  frontend:
    build:
      context: ./chatbot-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: nala-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - dashboard-backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_models:
    driver: local